services:
  init-permissions:
    image: busybox:1.36
    restart: "no"
    command:
      - sh
      - -c
      - mkdir -p /workspace/data/n8n && chown -R 1000:1000 /workspace/data
    volumes:
      - ./:/workspace

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    entrypoint:
      - tini
      - --
      - /bin/sh
      - /bootstrap/start-n8n.sh
    ports:
      - "5678:5678"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      N8N_PORT: 5678
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: crypto,fs
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data:/files
      - ./docker:/bootstrap:ro
      - ./workflows:/workflows:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:5678/healthz').then((res) =>
          process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
